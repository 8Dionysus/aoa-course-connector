name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python scripts/validate_connector.py
      - run: python -m pytest -q
      - run: python -m compileall -q src scripts
      - run: aoa-course doctor
      - run: aoa-course materialize fixture --run starter-fixture
      - run: aoa-course build-index --run starter-fixture
      - run: aoa-course build-graph --run starter-fixture
      - run: aoa-course answer "bootloader unlock rollback" --run starter-fixture
      - run: aoa-course eval answer-packets
      - run: aoa-course materialize stepik-fixture --run stepik-fixture
      - run: aoa-course build-index --run stepik-fixture
      - run: aoa-course build-graph --run stepik-fixture
      - run: aoa-course answer "Stepik public API evidence" --run stepik-fixture
      - run: aoa-course eval clean-api
      - run: aoa-course discover browser-fixture --platform getcourse --run getcourse-browser-discovery-fixture --register
      - run: aoa-course discover browser-fixture --platform skillspace --run skillspace-browser-discovery-fixture --register
      - run: aoa-course sources list
      - run: aoa-course eval install-route
      - run: aoa-course bootstrap fixture --run starter-fixture --connected-run connected-calibration
      - run: aoa-course sources answer "Stepik public API evidence" --platform stepik --mode hybrid
      - run: aoa-course eval source-registry-query --query "Stepik public API evidence" --query "canonical course objects" --platform stepik --kind smoke --mode hybrid
      - run: aoa-course eval browser-discovery
      - run: aoa-course sync browser-fixture --run browser-sync-fixture --build-artifacts
      - run: aoa-course sync status --run browser-sync-fixture
      - run: aoa-course eval browser-sync
      - run: aoa-course mcp call sync_status '{"sync_run":"browser-sync-fixture"}'
      - run: aoa-course materialize browser-fixture --platform getcourse --run getcourse-browser-fixture
      - run: aoa-course build-index --run getcourse-browser-fixture
      - run: aoa-course build-graph --run getcourse-browser-fixture
      - run: aoa-course answer "GetCourse bootloader rollback evidence" --run getcourse-browser-fixture
      - run: aoa-course materialize browser-fixture --platform skillspace --run skillspace-browser-fixture
      - run: aoa-course build-index --run skillspace-browser-fixture
      - run: aoa-course build-graph --run skillspace-browser-fixture
      - run: aoa-course answer "Skillspace logcat bugreport evidence" --run skillspace-browser-fixture
      - run: aoa-course eval browser-hard-adapters
      - run: aoa-course crawl browser-fixture --platform getcourse --run getcourse-browser-crawl-fixture
      - run: aoa-course build-index --run getcourse-browser-crawl-fixture
      - run: aoa-course build-graph --run getcourse-browser-crawl-fixture
      - run: aoa-course answer "GetCourse bootloader rollback evidence" --run getcourse-browser-crawl-fixture
      - run: aoa-course crawl browser-fixture --platform skillspace --run skillspace-browser-crawl-fixture
      - run: aoa-course build-index --run skillspace-browser-crawl-fixture
      - run: aoa-course build-graph --run skillspace-browser-crawl-fixture
      - run: aoa-course answer "Skillspace logcat bugreport evidence" --run skillspace-browser-crawl-fixture
      - run: aoa-course eval browser-crawl
      - run: aoa-course mcp tools
      - run: python scripts/verify_agent_install_route.py --skip-pytest
